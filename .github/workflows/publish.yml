name: GitHub Actions CI/CD — Discord Moderation Bot

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  # GitHub packages use lowercase repository paths
  BOT_IMAGE: ghcr.io/${{ github.repository }}/bot
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  # ── Publish Stage ────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and Push Bot Image
      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: |
            ${{ env.BOT_IMAGE }}:${{ github.ref_name }}
            ${{ env.BOT_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BOT_IMAGE }}:latest
          cache-to: type=inline

      # Build and Push Web Image
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.ref_name }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:latest
          cache-to: type=inline

  # ── Cleanup Stage ────────────────────────────────────────────────────────────
  cleanup:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      packages: write
    steps:
      - name: Clean up old container tags
        uses: actions/github-script@v7
        with:
          # Uses the implicit GITHUB_TOKEN provided by the runner
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            // Extract the repo name (ensuring it matches GHCR lowercase conventions)
            const repoName = context.repo.repo.toLowerCase();
            const currentTag = context.ref.replace('refs/tags/', '');
            const targetPackages = ['bot', 'web'];

            for (const subPackage of targetPackages) {
              const packageName = `${repoName}/${subPackage}`;
              console.log(`Checking tags for package: ${packageName}`);

              try {
                // Fetch all versions/tags for the container package
                const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: owner
                }).catch(() => {
                  // Fallback for user accounts if not inside an organization
                  return github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                    package_type: 'container',
                    package_name: packageName,
                    username: owner
                  });
                });

                for (const version of versions) {
                  const tags = version.metadata.container.tags;
                  
                  // If a version has no tags or contains a tag we want to keep, skip deletion
                  if (!tags || tags.includes('latest') || tags.includes(currentTag)) {
                    console.log(`  Keeping version ID ${version.id} with tags: ${tags ? tags.join(', ') : 'none'}`);
                    continue;
                  }

                  console.log(`  Deleting old version ID ${version.id} with tags: ${tags.join(', ')}`);
                  
                  await github.rest.packages.deletePackageVersionForOrg({
                    package_type: 'container',
                    package_name: packageName,
                    org: owner,
                    package_version_id: version.id
                  }).catch(() => {
                    return github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: owner,
                      package_version_id: version.id
                    });
                  });
                }
              } catch (error) {
                console.log(`Could not process package ${packageName}: ${error.message}`);
              }
            }
