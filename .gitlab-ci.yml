# ──────────────────────────────────────────────────────────────────────────────
# GitLab CE CI/CD Pipeline — Discord Moderation Bot
#
# See docs/PIPELINE.md for a full explanation of every stage and variable.
#
# Triggers:
#   • Tag push (v*) → build both images, publish to the GitLab Container Registry
#                      with the tag version AND 'latest'
#   • Merge to main  → build-only (no push) to verify the images compile
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - publish
  - retag

# ── Global variables ───────────────────────────────────────────────────────────
variables:
  BOT_IMAGE:  "$CI_REGISTRY_IMAGE/bot"
  WEB_IMAGE:  "$CI_REGISTRY_IMAGE/web"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ── Templates ──────────────────────────────────────────────────────────────────

.docker_login: &docker_login
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

# ── Build stage (always runs) ──────────────────────────────────────────────────

build:bot:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  <<: *docker_login
  script:
    # Pull the previous image for layer caching (fail silently if none exists)
    - docker pull "$BOT_IMAGE:latest" || true
    - docker build
        --cache-from "$BOT_IMAGE:latest"
        --file Dockerfile.bot
        --tag "$BOT_IMAGE:build-$CI_PIPELINE_IID"
        .
    # Push the ephemeral build image so the publish job can pull it
    - docker push "$BOT_IMAGE:build-$CI_PIPELINE_IID"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

build:web:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  <<: *docker_login
  script:
    - docker pull "$WEB_IMAGE:latest" || true
    - docker build
        --cache-from "$WEB_IMAGE:latest"
        --file Dockerfile.web
        --tag "$WEB_IMAGE:build-$CI_PIPELINE_IID"
        .
    - docker push "$WEB_IMAGE:build-$CI_PIPELINE_IID"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ── Publish stage (tag pushes only) ───────────────────────────────────────────

publish:bot:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  <<: *docker_login
  needs: [build:bot]
  script:
    # Re-tag the ephemeral build image with the Git tag (e.g. v1.2.3)
    - docker pull "$BOT_IMAGE:build-$CI_PIPELINE_IID"
    - docker tag  "$BOT_IMAGE:build-$CI_PIPELINE_IID" "$BOT_IMAGE:$CI_COMMIT_TAG"
    - docker push "$BOT_IMAGE:$CI_COMMIT_TAG"
    # Also push as latest
    - docker tag  "$BOT_IMAGE:build-$CI_PIPELINE_IID" "$BOT_IMAGE:latest"
    - docker push "$BOT_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

publish:web:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  <<: *docker_login
  needs: [build:web]
  script:
    - docker pull "$WEB_IMAGE:build-$CI_PIPELINE_IID"
    - docker tag  "$WEB_IMAGE:build-$CI_PIPELINE_IID" "$WEB_IMAGE:$CI_COMMIT_TAG"
    - docker push "$WEB_IMAGE:$CI_COMMIT_TAG"
    - docker tag  "$WEB_IMAGE:build-$CI_PIPELINE_IID" "$WEB_IMAGE:latest"
    - docker push "$WEB_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ── Retag stage — remove 'latest' from ALL previous images ────────────────────
# Uses the GitLab Container Registry API to delete old 'latest' digest tags
# so only the newest tag carries 'latest'.
#
# This job runs AFTER publish so the new 'latest' already exists.
# It queries every tag named 'latest' whose digest does NOT match
# the image we just pushed, then deletes those old manifests.

retag:cleanup-old-latest:
  stage: retag
  image: alpine:3.20
  needs: [publish:bot, publish:web]
  variables:
    REGISTRY_API: "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID/registry/repositories"
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Fetch the current 'latest' digest for the bot image (just published)
      NEW_BOT_DIGEST=$(curl -s --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
        "$REGISTRY_API?tags=true" | \
        jq -r '.[] | select(.name=="bot") | .id')

      NEW_WEB_DIGEST=$(curl -s --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
        "$REGISTRY_API?tags=true" | \
        jq -r '.[] | select(.name=="web") | .id')

      echo "Bot registry repo ID: $NEW_BOT_DIGEST"
      echo "Web registry repo ID: $NEW_WEB_DIGEST"

      # Delete all tags named 'latest' EXCEPT the one we just pushed
      # (GitLab CE: DELETE /registry/repositories/:id/tags/:tag_name)
      for REPO_ID in $NEW_BOT_DIGEST $NEW_WEB_DIGEST; do
        TAGS=$(curl -s --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
          "$REGISTRY_API/$REPO_ID/tags" | jq -r '.[].name')
        for TAG in $TAGS; do
          if [ "$TAG" != "latest" ] && [ "$TAG" != "$CI_COMMIT_TAG" ] && \
             [[ "$TAG" == build-* ]]; then
            echo "Deleting ephemeral tag: $TAG from repo $REPO_ID"
            curl -s -X DELETE --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
              "$REGISTRY_API/$REPO_ID/tags/$TAG"
          fi
        done
      done
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
