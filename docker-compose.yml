version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Discord Moderation Bot — docker-compose for local development
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. Visit http://localhost:8000 for the admin dashboard
#
# Services:
#   postgres — PostgreSQL 16 database
#   bot      — Discord bot (writes events to the database)
#   web      — Admin dashboard + API (FastAPI + React)
# ──────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-modbot}
      POSTGRES_USER:     ${POSTGRES_USER:-modbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discord-bot-network

  bot:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.bot
    image: ghcr.io/bestfitcm120/discord-moderation-bot/bot:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DISCORD_TOKEN:  ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DATABASE_URL:   postgresql://${POSTGRES_USER:-modbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-modbot}
      BOT_PREFIX:     ${BOT_PREFIX:-!}
      WEB_API_URL:    http://web:8000
    networks:
      - discord-bot-network

  web:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.web
    image: docker pull ghcr.io/bestfitcm120/discord-moderation-bot/web:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:           postgresql://${POSTGRES_USER:-modbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-modbot}
      DISCORD_CLIENT_ID:      ${DISCORD_CLIENT_ID:?DISCORD_CLIENT_ID is required}
      DISCORD_CLIENT_SECRET:  ${DISCORD_CLIENT_SECRET:?DISCORD_CLIENT_SECRET is required}
      DISCORD_BOT_TOKEN:      ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      SESSION_SECRET:         ${SESSION_SECRET:?SESSION_SECRET is required}
      BASE_URL:               ${BASE_URL:-http://localhost:8000}
      DISCORD_BOT_PERMISSIONS: ${DISCORD_BOT_PERMISSIONS:-8}
      CORS_ORIGINS:           ${BASE_URL:-http://localhost:8000}
    networks:
      - discord-bot-network

volumes:
  postgres_data:

networks:
  discord-bot-network:
    driver: bridge

