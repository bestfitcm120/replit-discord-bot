name: Publish Docker Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish-bot:
    name: Publish Bot Image
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Cache
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/bot:latest || true

      - name: Build Bot Image
        run: |
          docker build \
            --cache-from ghcr.io/${{ github.repository_owner }}/bot:latest \
            -f Dockerfile.bot \
            -t ghcr.io/${{ github.repository_owner }}/bot:${{ steps.version.outputs.tag }} \
            -t ghcr.io/${{ github.repository_owner }}/bot:latest \
            .

      - name: Push Bot Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/bot:${{ steps.version.outputs.tag }}
          docker push ghcr.io/${{ github.repository_owner }}/bot:latest

  publish-web:
    name: Publish Web Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Cache
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/web:latest || true

      - name: Build Web Image
        run: |
          docker build \
            --cache-from ghcr.io/${{ github.repository_owner }}/web:latest \
            -f Dockerfile.web \
            -t ghcr.io/${{ github.repository_owner }}/web:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/web:latest \
            .

      - name: Push Web Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/web:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/web:latest

  cleanup:
    name: Cleanup Old Tags
    runs-on: ubuntu-latest
    needs:
      - publish-bot
      - publish-web

    steps:
      - name: Cleanup Bot Tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh api \
            /users/${{ github.repository_owner }}/packages/container/bot/versions \
            --paginate > bot_versions.json

          jq -r '.[].id' bot_versions.json | while read ID; do
            TAGS=$(gh api /user/packages/container/bot/versions/$ID 2>/dev/null | jq -r '.metadata.container.tags[]?')

            KEEP=false
            for TAG in $TAGS; do
              if [ "$TAG" = "latest" ] || [ "$TAG" = "$VERSION" ]; then
                KEEP=true
              fi
            done

            if [ "$KEEP" = false ]; then
              echo "Deleting bot version $ID"
              gh api \
                --method DELETE \
                /user/packages/container/bot/versions/$ID || true
            fi
          done

      - name: Cleanup Web Tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh api \
            /users/${{ github.repository_owner }}/packages/container/web/versions \
            --paginate > web_versions.json

          jq -r '.[].id' web_versions.json | while read ID; do
            TAGS=$(gh api /user/packages/container/web/versions/$ID 2>/dev/null | jq -r '.metadata.container.tags[]?')

            KEEP=false
            for TAG in $TAGS; do
              if [ "$TAG" = "latest" ] || [ "$TAG" = "$VERSION" ]; then
                KEEP=true
              fi
            done

            if [ "$KEEP" = false ]; then
              echo "Deleting web version $ID"
              gh api \
                --method DELETE \
                /user/packages/container/web/versions/$ID || true
            fi
          done
