name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  VERSION: ${{ github.ref_name }}

jobs:
  publish-bot:
    name: Publish Bot Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Existing Cache
        run: |
          docker pull ghcr.io/${OWNER}/bot:latest || true

      - name: Build Bot Image
        run: |
          docker build \
            --cache-from ghcr.io/${OWNER}/bot:latest \
            -f Dockerfile.bot \
            -t ghcr.io/${OWNER}/bot:${VERSION} \
            -t ghcr.io/${OWNER}/bot:latest \
            .

      - name: Push Bot Image
        run: |
          docker push ghcr.io/${OWNER}/bot:${VERSION}
          docker push ghcr.io/${OWNER}/bot:latest

  publish-web:
    name: Publish Web Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Existing Cache
        run: |
          docker pull ghcr.io/${OWNER}/web:latest || true

      - name: Build Web Image
        run: |
          docker build \
            --cache-from ghcr.io/${OWNER}/web:latest \
            -f Dockerfile.web \
            -t ghcr.io/${OWNER}/web:${VERSION} \
            -t ghcr.io/${OWNER}/web:latest \
            .

      - name: Push Web Image
        run: |
          docker push ghcr.io/${OWNER}/web:${VERSION}
          docker push ghcr.io/${OWNER}/web:latest

  cleanup:
    name: Cleanup Old Versions
    runs-on: ubuntu-latest

    needs:
      - publish-bot
      - publish-web

    steps:
      - name: Cleanup Bot Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "/users/${OWNER}/packages/container/bot/versions?per_page=100" \
            > bot_versions.json

          jq -c '.[]' bot_versions.json | while read VERSION_DATA; do

            ID=$(echo "$VERSION_DATA" | jq -r '.id')

            TAGS=$(echo "$VERSION_DATA" \
              | jq -r '.metadata.container.tags[]?')

            KEEP=false

            for TAG in $TAGS; do
              if [ "$TAG" = "latest" ] || [ "$TAG" = "${VERSION}" ]; then
                KEEP=true
              fi
            done

            if [ "$KEEP" = "false" ]; then
              echo "Deleting bot version ID $ID"

              gh api \
                --method DELETE \
                "/user/packages/container/bot/versions/$ID" \
                || true
            fi
          done

      - name: Cleanup Web Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "/users/${OWNER}/packages/container/web/versions?per_page=100" \
            > web_versions.json

          jq -c '.[]' web_versions.json | while read VERSION_DATA; do

            ID=$(echo "$VERSION_DATA" | jq -r '.id')

            TAGS=$(echo "$VERSION_DATA" \
              | jq -r '.metadata.container.tags[]?')

            KEEP=false

            for TAG in $TAGS; do
              if [ "$TAG" = "latest" ] || [ "$TAG" = "${VERSION}" ]; then
                KEEP=true
              fi
            done

            if [ "$KEEP" = "false" ]; then
              echo "Deleting web version ID $ID"

              gh api \
                --method DELETE \
                "/user/packages/container/web/versions/$ID" \
                || true
            fi
          done
