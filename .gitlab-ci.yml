# ──────────────────────────────────────────────────────────────────────────────
# GitLab CE CI/CD Pipeline — Discord Moderation Bot
#
# See docs/PIPELINE.md for a full explanation of every stage and variable.
#
# Triggers:
#   • Tag push matching v* → builds both images and publishes them to the
#     GitLab Container Registry tagged with the version (e.g. v1.2.3) AND latest.
#
# Runner setup: Docker executor with socket binding (no dind).
# In your runner config.toml ensure:
#   [runners.docker]
#     privileged = false
#     volumes = ["/var/run/docker.sock:/var/run/docker.sock", "/cache"]
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - publish
  - cleanup

# ── Global variables ───────────────────────────────────────────────────────────
variables:
  BOT_IMAGE:    "$CI_REGISTRY_IMAGE/bot"
  WEB_IMAGE:    "$CI_REGISTRY_IMAGE/web"
  DOCKER_DRIVER: overlay2
  DOCKER_HOST:  "unix:///var/run/docker.sock"

# ── Shared template ────────────────────────────────────────────────────────────
.docker_job: &docker_job
  image: docker:27
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ── Publish stage ──────────────────────────────────────────────────────────────
# Each job: build → tag with version + latest → push both.
# Uses the existing 'latest' image as a cache layer to speed up builds.

publish:bot:
  stage: publish
  <<: *docker_job
  script:
    - docker pull "$BOT_IMAGE:latest" || true
    - docker build
        --cache-from "$BOT_IMAGE:latest"
        --file Dockerfile.bot
        --tag "$BOT_IMAGE:$CI_COMMIT_TAG"
        --tag "$BOT_IMAGE:latest"
        .
    - docker push "$BOT_IMAGE:$CI_COMMIT_TAG"
    - docker push "$BOT_IMAGE:latest"

publish:web:
  stage: publish
  <<: *docker_job
  script:
    - docker pull "$WEB_IMAGE:latest" || true
    - docker build
        --cache-from "$WEB_IMAGE:latest"
        --file Dockerfile.web
        --tag "$WEB_IMAGE:$CI_COMMIT_TAG"
        --tag "$WEB_IMAGE:latest"
        .
    - docker push "$WEB_IMAGE:$CI_COMMIT_TAG"
    - docker push "$WEB_IMAGE:latest"

# ── Cleanup stage ──────────────────────────────────────────────────────────────
# Deletes all tags that are NOT the version tag or latest, keeping the registry tidy.
# Requires CI_REGISTRY_TOKEN set in GitLab → Settings → CI/CD → Variables.

cleanup:old-tags:
  stage: cleanup
  image: alpine:3.20
  needs: [publish:bot, publish:web]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  variables:
    REGISTRY_API: "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID/registry/repositories"
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      for REPO_NAME in bot web; do
        REPO_ID=$(curl -s --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
          "$REGISTRY_API" | jq -r --arg n "$REPO_NAME" '.[] | select(.name==$n) | .id')

        if [ -z "$REPO_ID" ]; then
          echo "Could not find registry repo for $REPO_NAME, skipping."
          continue
        fi

        echo "Cleaning up old tags in $REPO_NAME (repo ID: $REPO_ID)"

        TAGS=$(curl -s --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
          "$REGISTRY_API/$REPO_ID/tags" | jq -r '.[].name')

        for TAG in $TAGS; do
          if [ "$TAG" = "latest" ] || [ "$TAG" = "$CI_COMMIT_TAG" ]; then
            echo "  Keeping: $TAG"
          else
            echo "  Deleting: $TAG"
            curl -s -X DELETE --header "PRIVATE-TOKEN: $CI_REGISTRY_TOKEN" \
              "$REGISTRY_API/$REPO_ID/tags/$TAG"
          fi
        done
      done
